<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escape School</title>
  <style>
    /* 基础样式重置，确保游戏全屏且没有烦人的滚动条 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000; /* 画布外的背景色 */
      overflow: hidden;       /* 隐藏滚动条 */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 给 Canvas 加上一点基础样式，比如让它保持像素风的清晰度 */
    #gameCanvas {
      image-rendering: pixelated; /* 强制像素缩放，边缘不模糊 */
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.8); /* 稍微加点阴影，更好看 */
    }
  </style>
</head>
<body>
  
  <canvas id="gameCanvas"></canvas>

  <script type="module" src="/src/main.ts"></script>

</body>
</html>
